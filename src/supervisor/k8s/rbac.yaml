# Least-privilege RBAC for the Supervisor.
# Role (not ClusterRole) — scoped to aegis-mesh namespace only.
# The supervisor can only list and delete pods within its own namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: supervisor-pod-terminator
  namespace: aegis-mesh
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: supervisor-pod-terminator-binding
  namespace: aegis-mesh
subjects:
  - kind: ServiceAccount
    name: supervisor-ksa
    namespace: aegis-mesh
roleRef:
  kind: Role
  name: supervisor-pod-terminator
  apiGroup: rbac.authorization.k8s.io
