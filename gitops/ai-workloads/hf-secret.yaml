# Token is managed manually — never committed to git.
# Set it once after cluster creation:
#   kubectl create secret generic hf-secret \
#     --from-literal=HF_TOKEN=<your_token> \
#     -n aegis-mesh
#
# ArgoCD manages the Secret object's existence (so it appears in sync status)
# but is explicitly prevented from overwriting the token value:
#   - ServerSideApply=false on this resource disables field-manager ownership of /data
#   - ignoreDifferences on /data + /stringData in the Application prevents drift detection
apiVersion: v1
kind: Secret
metadata:
  name: hf-secret
  namespace: aegis-mesh
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=false
type: Opaque
