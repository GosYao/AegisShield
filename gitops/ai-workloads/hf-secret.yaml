# This manifest is a placeholder.
# Apply the actual secret manually before ArgoCD syncs InferenceServices:
#   kubectl create secret generic hf-secret \
#     --from-literal=HF_TOKEN=<your_token> \
#     -n aegis-mesh
#
# For production, replace this with an ExternalSecret pulling from GCP Secret Manager.
apiVersion: v1
kind: Secret
metadata:
  name: hf-secret
  namespace: aegis-mesh
type: Opaque
stringData:
  HF_TOKEN: "REPLACE_WITH_HF_TOKEN"
