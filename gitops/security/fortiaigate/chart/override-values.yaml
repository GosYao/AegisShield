# FortiAIGate 8.0.0 — Helm values override
# Place this file inside gitops/security/fortiaigate/chart/ alongside Chart.yaml.
# ArgoCD will use it as the values override automatically.

# ── Global ────────────────────────────────────────────────────────────────────
global:
  security:
    allowInsecureImages: true   # Required — images come from private registry

  # License mapping: one .lic file per GKE worker node.
  licenses:
    "gke-aegis-cluster-system-pool-0d923f07-342h": "files/licenses/FAIGCNSD26000104.lic"
    "gke-aegis-cluster-system-pool-0d923f07-crkl": "files/licenses/FAIGCNSD26000104.lic"
    "gke-aegis-cluster-system-pool-0d923f07-hxjm": "files/licenses/FAIGCNSD26000104.lic"
    "gke-aegis-cluster-system-pool-0d923f07-mfs2": "files/licenses/FAIGCNSD26000104.lic"
    "gke-aegis-cluster-system-pool-0d923f07-f5wz": "files/licenses/FAIGCNSD26000104.lic"

# ── FortiAIGate image & GPU ───────────────────────────────────────────────────
fortiaigate:
  image:
    repository: us-central1-docker.pkg.dev/gyao-bde-demo/aegis-repo
    tag: V8.0.0-build0023
    pullPolicy: IfNotPresent
    pullSecrets: []

  gpu:
    enabled: false            # Disabled — GPU nodes fully used by KServe models

triton:
  replicas: 0                 # Disabled — GPU unavailable; text scanners don't require Triton

# ── Storage (API and Core services) ───────────────────────────────────────────
storage:
  size: 8Gi
  storageClass: nfs-rwx
  existingPvName: ""

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  className: nginx
  host: ""
  annotations: {}

# ── TLS ───────────────────────────────────────────────────────────────────────
tls:
  enabled: true
  mountPath: "/etc/tls"
  cert: files/certificate/dflt.crt
  key: files/certificate/dflt.key

# ── PostgreSQL ────────────────────────────────────────────────────────────────
# Fixed passwords prevent secret drift across ArgoCD syncs (demo environment).
postgresql:
  auth:
    password: "FortiAIGateDemo2024!"
    postgresPassword: "FortiAIGateAdmin2024!"
  primary:
    persistence:
      size: 8Gi
      storageClass: nfs-rwx

# ── Redis — Bitnami default is 250m/512Mi; restored to production values ─────
redis:
  master:
    persistence:
      size: 4Gi
      storageClass: nfs-rwx
