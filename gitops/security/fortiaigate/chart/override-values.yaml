# FortiAIGate 8.0.0 — Helm values override
# Place this file inside gitops/security/fortiaigate/chart/ alongside Chart.yaml.
# ArgoCD will use it as the values override automatically.

# ── Global ────────────────────────────────────────────────────────────────────
global:
  security:
    allowInsecureImages: true   # Required — images come from private registry

  # License mapping: one .lic file per GKE worker node.
  licenses:
    "gke-aegis-cluster-system-pool-83c99e06-4wc6": "files/licenses/FAIGCNSD26000104.lic"
    "gke-aegis-cluster-system-pool-83c99e06-7zkx": "files/licenses/FAIGCNSD26000135.lic"

# ── FortiAIGate image & GPU ───────────────────────────────────────────────────
fortiaigate:
  image:
    repository: us-central1-docker.pkg.dev/gyao-bde-demo/aegis-repo
    tag: V8.0.0-build0023
    pullPolicy: IfNotPresent
    pullSecrets: []

  gpu:
    enabled: false            # Disabled — GPU nodes fully used by KServe models

triton:
  replicas: 1                 # CPU-only — GPU nodes fully used by KServe; slower but functional for demo
  resources:
    requests:
      cpu: 500m
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 8Gi

# ── Storage (API and Core services) ───────────────────────────────────────────
storage:
  size: 8Gi
  storageClass: nfs-rwx
  existingPvName: ""

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  className: nginx
  host: ""
  annotations: {}

# ── TLS ───────────────────────────────────────────────────────────────────────
tls:
  enabled: true
  mountPath: "/etc/tls"
  cert: files/certificate/dflt.crt
  key: files/certificate/dflt.key

# ── PostgreSQL ────────────────────────────────────────────────────────────────
# Fixed passwords prevent secret drift across ArgoCD syncs (demo environment).
postgresql:
  auth:
    password: "FortiAIGateDemo2024!"
    postgresPassword: "FortiAIGateAdmin2024!"
  primary:
    resources:
      requests:
        cpu: 100m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 4Gi
    persistence:
      size: 8Gi
      storageClass: nfs-rwx

# ── Demo CPU/memory requests ──────────────────────────────────────────────────
# Production defaults are 1000m CPU + 6Gi memory per scanner — too large for
# shared e2-standard-4 nodes. Limits kept at production values to allow bursting.
core:
  resources:
    requests:
      cpu: 100m
      memory: 2Gi
    limits:
      cpu: "1"
      memory: 4Gi

scanners:
  defaultResources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  sensitive:
    resources:
      requests:
        cpu: 100m
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 10Gi
  anonymize:
    resources:
      requests:
        cpu: 100m
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 40Gi

logd:
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── Redis ─────────────────────────────────────────────────────────────────────
redis:
  master:
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
    persistence:
      size: 4Gi
      storageClass: nfs-rwx
