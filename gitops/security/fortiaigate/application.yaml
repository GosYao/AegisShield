# ArgoCD Application for FortiAIGate 8.0.0
#
# IMPORTANT: FortiAIGate does NOT have a public Helm repository.
# The Helm chart is distributed as a local TAR archive by Fortinet.
#
# Before this Application can sync:
#   1. Download the Helm chart TAR from Fortinet Infosite:
#      https://info.fortinet.com/builds/?project_id=807
#   2. Extract the archive and commit the chart directory to:
#      gitops/security/fortiaigate/chart/
#   3. Complete values.yaml with all required placeholders
#   4. Push to the GosYao/AegisShield repo — ArgoCD will then sync
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fortiaigate
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/GosYao/AegisShield.git
    targetRevision: main
    path: gitops/security/fortiaigate/chart
    helm:
      valueFiles:
        - override-values.yaml   # Our overrides on top of chart defaults
  destination:
    server: https://kubernetes.default.svc
    namespace: fortiaigate
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: false    # Never auto-prune FortiAIGate — manual gate for safety
      selfHeal: false
