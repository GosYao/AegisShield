# ArgoCD Application for FortiAIGate 8.0.0
#
# IMPORTANT: FortiAIGate does NOT have a public Helm repository.
# The Helm chart is distributed as a local TAR archive by Fortinet.
#
# Before this Application can sync:
#   1. Download the Helm chart TAR from Fortinet Infosite:
#      https://info.fortinet.com/builds/?project_id=807
#   2. Extract the archive and commit the chart directory to:
#      gitops/security/fortiaigate/chart/
#   3. Complete values.yaml with all required placeholders
#   4. Push to the GosYao/AegisShield repo — ArgoCD will then sync
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fortiaigate
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/GosYao/AegisShield.git
    targetRevision: main
    path: gitops/security/fortiaigate/chart
    helm:
      valueFiles:
        - override-values.yaml   # Our overrides on top of chart defaults
  destination:
    server: https://kubernetes.default.svc
    namespace: fortiaigate
  # Prevent ArgoCD from overwriting secrets generated by Helm's randAlphaNum.
  # ArgoCD does not support the Helm `lookup` function — every sync regenerates
  # secrets that use `lookup | default (randAlphaNum ...)`, causing key rotation
  # and breaking encrypted Redis data. ignoreDifferences tells ArgoCD to leave
  # these secret values alone after initial creation.
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: fortiaigate-license-manager
      jsonPointers:
        - /data/license-key
    - group: ""
      kind: Secret
      name: fortiaigate-redis
      jsonPointers:
        - /data/redis-password
    - group: ""
      kind: Secret
      name: fortiaigate-postgresql
      jsonPointers:
        - /data/password
        - /data/postgres-password

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    automated:
      prune: false    # Never auto-prune FortiAIGate — manual gate for safety
      selfHeal: false
