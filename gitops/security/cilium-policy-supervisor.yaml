# L4 NetworkPolicy for the Supervisor pod.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: supervisor-egress-policy
  namespace: aegis-mesh
spec:
  podSelector:
    matchLabels:
      app: aegis-supervisor

  policyTypes:
    - Ingress
    - Egress

  # INGRESS: accept calls from the agent only
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: aegis-agent
      ports:
        - port: 8081
          protocol: TCP

  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

    # phi-3-mini / TinyLlama KServe endpoint
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: aegis-mesh
      ports:
        - port: 80
          protocol: TCP
        - port: 8080
          protocol: TCP

    # Kubernetes API server — required for pod deletion enforcement
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
